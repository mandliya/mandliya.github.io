# Site settings
title: Deeply Learning
first_name: Ravi
middle_name:
last_name: Mandliya
contact_note: ""
description: >
  Research notes and code-heavy deep learning writeups.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
lang: en
icon: ""

url: https://mandliya.github.io
baseurl: ""
last_updated: false
back_to_top: true

# Layout
navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: false
posts_in_search: true
bib_search: false
max_width: 950px

# Blog
blog_name: Deeply Learning
blog_description: "Ravi's Learnings, Code & Thoughts"
permalink: /blog/:year/:title/
lsi: false

pagination:
  enabled: true

related_blog_posts:
  enabled: true
  max_related: 5

# Disable external feed aggregation for simplicity
external_sources: []

# Comments off
giscus:
  repo:
  repo_id:
  category: Comments
  category_id:
  mapping: title
  strict: 1
  reactions_enabled: 1
  input_position: bottom
  dark_theme: dark
  light_theme: light
  emit_metadata: 0
  lang: en
disqus_shortname:

# Collections (keep minimal feature set)
collections:
  news:
    defaults:
      layout: post
    output: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /blog/:year/:title/

# Markdown + highlighting
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# Files
include: ["_pages"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - FAQ.md
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - lighthouse_results/
  - package.json
  - package-lock.json
  - purgecss.config.js
  - README.md
  - readme_preview/
  - vendor
  - docs
  - tools
  - "*.gemspec"
keep_files:
  - CNAME
  - .nojekyll

# Plugins (stable subset needed for core theme features)
plugins:
  - jekyll-archives-v2
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-link-attributes
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-scholar
  - jekyll-socials
  - jekyll-sitemap
  - jekyll-toc
  - jemoji

# Archives used by blog page links
jekyll-archives:
  posts:
    enabled: [year, tags, categories]
    permalinks:
      year: "/blog/:year/"
      tags: "/blog/:type/:name/"
      categories: "/blog/:type/:name/"

display_tags: []
display_categories: []

# Optional toggles
enable_math: true
enable_tooltips: false
enable_darkmode: true
enable_navbar_social: false
enable_progressbar: false

# Third-party libraries used by includes/head.liquid and includes/scripts.liquid.
third_party_libraries:
  jquery:
    integrity:
      js: "sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
    url:
      js: "https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"
    version: "3.6.0"
  mdb:
    integrity:
      css: "sha256-jpjYvU3G3N6nrrBwXJoVEYI/0zw8htfFnhT9ljN3JJw="
      js: "sha256-NdbiivsvWt7VYCt6hYNT3h/th9vSTL4EDWeGs5SN3DA="
    url:
      css: "https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/css/mdb.min.css"
      js: "https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/js/mdb.min.js"
    version: "4.20.0"
  google_fonts:
    url:
      fonts: "https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:100,300,400,500,700|Material+Icons&display=swap"
  mathjax:
    integrity:
      js: "sha256-MASABpB4tYktI2Oitl4t+78w/lyA+D7b/s9GEP0JOGI="
    local:
      fonts: "output/chtml/fonts/woff-v2/"
    url:
      fonts: "https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/output/chtml/fonts/woff-v2/"
      js: "https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js"
    version: "3.2.2"
  polyfill:
    url:
      js: "https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"
    version: "3"

sass:
  style: compressed
